<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART-FARM</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* BACKGROUND */
body{
    background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('assets/whole grain.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:white;
}

/* MAIN BOX */
.container{
    display:flex;
    justify-content:center;
    padding:30px;
}

/* CHAT CARD */
.chat-box{
    width:700px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.1);
}

/* HEADER */
h2{
    text-align:center;
    color:#7CFC90;
    margin-bottom:10px;
}

/* CHAT AREA */
#chat{
    height:250px;
    overflow-y:auto;
    background:rgba(0,0,0,0.3);
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}

/* INPUTS */
input[type="text"]{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    outline:none;
    margin-bottom:10px;
}

/* IMAGE UPLOAD */
input[type="file"]{
    margin:10px 0;
    color:white;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2e7d32;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}

/* IMAGE PREVIEW */
#preview{
    width:100%;
    margin-top:10px;
    border-radius:10px;
    display:none;
}

/* BACK LINK */
a{
    display:block;
    margin-top:10px;
    text-align:center;
    color:aqua;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="chat-box">

<h2>🌿 Talk to AgriVet AI</h2>

<!-- CHAT DISPLAY -->
<div id="chat"></div>

<!-- TEXT INPUT -->
<input type="text" id="userText" placeholder="Ask about your crop...">

<!-- IMAGE UPLOAD -->
<input type="file" id="imageInput" accept="image/*">

<img id="preview">

<button onclick="sendMessage()">Send to AI</button>

<a href="dashboard.html">← Go back home</a>

</div>

</div>

<script>

const chat = document.getElementById("chat");
const preview = document.getElementById("preview");

/* IMAGE PREVIEW */
document.getElementById("imageInput").addEventListener("change", function(event){
    const file = event.target.files[0];

    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            preview.src = e.target.result;
            preview.style.display = "block";
        }

        reader.readAsDataURL(file);
    }
});

/* AI RESPONSE SYSTEM (SIMULATED) */
function getAIResponse(text){
    text = text.toLowerCase();

    if(text.includes("yellow")){
        return "🌿 Possible nitrogen deficiency detected. Recommend fertilizer application.";
    }

    if(text.includes("spots")){
        return "🍃 Likely fungal infection. Consider applying fungicide.";
    }

    if(text.includes("wilt")){
        return "⚠ Crop stress detected. Check soil moisture levels.";
    }

    return "🌱 Upload image or describe symptoms for better diagnosis.";
}

/* SEND MESSAGE */
function sendMessage(){

    let text = document.getElementById("userText").value;
    let file = document.getElementById("imageInput").files[0];

    if(text.trim() === "" && !file){
        return;
    }

    // USER MESSAGE
    chat.innerHTML += `<p><b style="color:#7CFC90">You:</b> ${text}</p>`;

    if(file){
        chat.innerHTML += `<p><b style="color:#7CFC90">You uploaded an image for analysis 📷</b></p>`;
    }

    let response = getAIResponse(text);

    setTimeout(() => {
        chat.innerHTML += `<p><b style="color:#FFD700">AgriVet AI:</b> ${response}</p>`;
        chat.scrollTop = chat.scrollHeight;
    }, 800);

    document.getElementById("userText").value = "";
    document.getElementById("imageInput").value = "";
    preview.style.display = "none";
}

</script>

</body>
</html>
