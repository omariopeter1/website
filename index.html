<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART-FARM Login</title>

<style>
body{
    background: linear-gradient(135deg, rgba(0,255,0,0.2), rgba(0,100,0,0.3));
    font-family: Arial, sans-serif;
}

.container{
    display:flex;
    justify-content:center;
    margin-top:80px;
}

form{
    background: bisque;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1,h2{
    text-align:center;
}

.box{
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
    outline: none;
}

.login{
    width: 100%;
    padding: 10px;
    background: green;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.login:hover{
    background: darkgreen;
}

a{
    text-decoration:none;
    color: red;
}
a:hover{
    color: darkred;
}

.msg{
    text-align:center;
    color:red;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<form id="loginForm">

    <h1>SMART-FARM WEB</h1>
    <h2>Login</h2>

    <input id="username" type="text" class="box" placeholder="Username" required>
    <input id="email" type="email" class="box" placeholder="Email" required>
    <input id="password" type="password" class="box" placeholder="Password" required>

    <button type="submit" class="login">Login</button>

    <p class="msg" id="msg"></p>

    <p style="text-align:center;">Or</p>

    <a href="https://mail.google.com">Sign in with Gmail</a>
    <br><br>
    <a href="create account.html">Create an account</a>

</form>

</div>

<script>
// run after page loads
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    // simple demo login
    if(user === "admin" && pass === "1234"){
        msg.style.color = "green";
        msg.innerText = "Login successful...";

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1000);

    } else {
        msg.style.color = "red";
        msg.innerText = "Invalid username or password";
    }
});
</script>

</body>
</html>
